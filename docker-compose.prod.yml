# Produksi VPS — nempel ke Traefik yang SUDAH ADA di server (jangan jalankan Traefik kedua).
# VPS sudah punya: container `traefik` (v3) di network `traefik-public`, entrypoints
# web/websecure, certresolver `letsencrypt`. Kita cukup tambah `web` + `postgres`.
#
# Deploy: docker compose -f docker-compose.prod.yml up -d --build
# Butuh: root .env (DB_USER/DB_PASSWORD/DB_NAME/DOMAIN) + web/.env (lihat docs/DEPLOY-VPS.md).

services:
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pos-data-prod:/var/lib/postgresql/data
    networks:
      - pos-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: pos-web-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./web/.env
    networks:
      - pos-internal
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTPS
      - "traefik.http.routers.pos-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.pos-web.entrypoints=websecure"
      - "traefik.http.routers.pos-web.tls=true"
      - "traefik.http.routers.pos-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.pos-web.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.pos-web-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.pos-web-http.entrypoints=web"
      - "traefik.http.routers.pos-web-http.middlewares=pos-redirect-https"
      - "traefik.http.middlewares.pos-redirect-https.redirectscheme.scheme=https"

networks:
  pos-internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  pos-data-prod:
