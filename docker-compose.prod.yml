# Produksi VPS — nempel ke Traefik bersama + Postgres bersama yang SUDAH ADA di server.
# VPS sudah punya: `traefik` (v3) di network `traefik-public`, dan `shared-postgres`
# di network `postgres-shared` (lihat /opt/shared-postgres). Kita cukup jalankan `web`.
#
# Deploy: docker compose -f docker-compose.prod.yml up -d --build
# Butuh: root .env (DOMAIN) + web/.env (DATABASE_URL → shared-postgres/pos_db, dll).
#
# DB: TIDAK lagi container sendiri. `web` connect ke `shared-postgres:5432/pos_db`
#     via network `postgres-shared`. Tiap app punya db+user sendiri (isolasi).

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    # Tag eksplisit agar deploy.yml bisa tag :previous & rollback (IMAGE_TAG=previous).
    image: antigravity-pos-web:${IMAGE_TAG:-latest}
    container_name: pos-web-prod
    restart: unless-stopped
    env_file:
      - ./web/.env
    networks:
      - postgres-shared
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTPS
      - "traefik.http.routers.pos-web.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.pos-web.entrypoints=websecure"
      - "traefik.http.routers.pos-web.tls=true"
      - "traefik.http.routers.pos-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.pos-web.loadbalancer.server.port=3000"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.pos-web-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.pos-web-http.entrypoints=web"
      - "traefik.http.routers.pos-web-http.middlewares=pos-redirect-https"
      - "traefik.http.middlewares.pos-redirect-https.redirectscheme.scheme=https"
    # Batasi log Docker agar tak menumpuk & memenuhi disk (penyebab outage di VPS kecil).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  postgres-shared:
    external: true          # dikelola /opt/shared-postgres
  traefik-public:
    external: true
