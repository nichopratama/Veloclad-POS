name: Deploy POS to VPS

# Gate produksi (D9): deploy HANYA jalan setelah workflow CI selesai sukses di main.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Satu deploy produksi dalam satu waktu.
concurrency:
  group: deploy-pos-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Jangan deploy kalau CI merah.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH (backup → build → health-gate → rollback)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/antigravity-pos

            # Muat env (DB_USER, DB_NAME) untuk backup.
            set -a; . ./.env; set +a

            COMPOSE="docker compose -f docker-compose.prod.yml"

            echo "1. Backup DB sebelum deploy..."
            mkdir -p backups
            docker exec pos-postgres-prod pg_dump -U "$DB_USER" -d "$DB_NAME" \
              > "backups/db_predeploy_$(date +%Y%m%d_%H%M%S).sql" \
              || echo "WARN: backup gagal (DB belum jalan?) — lanjut."
            # Simpan 10 backup terbaru saja.
            ls -1t backups/db_predeploy_*.sql 2>/dev/null | tail -n +11 | xargs -r rm -f

            echo "2. Tag image web saat ini sebagai :previous (untuk rollback)..."
            docker tag antigravity-pos-web:latest antigravity-pos-web:previous || true

            echo "3. Pull kode + build + up..."
            git pull origin main
            $COMPOSE up -d --build

            echo "4. Health-check /api/health/ready (Prisma + DB)..."
            HEALTHY=false
            for i in $(seq 1 12); do
              if docker exec pos-web-prod node -e "fetch('http://localhost:3000/api/health/ready').then(r=>r.text()).then(t=>process.exit(t.includes('ready')?0:1)).catch(()=>process.exit(1))"; then
                echo "Health OK"; HEALTHY=true; break
              fi
              echo "menunggu web siap... ($i/12)"; sleep 5
            done

            if [ "$HEALTHY" = false ]; then
              echo "CRITICAL: health gagal! Rollback ke image :previous..."
              IMAGE_TAG=previous $COMPOSE up -d --no-build web || true
              echo "Rollback selesai. (Catatan: perubahan DB additif tak di-revert.)"
              exit 1
            fi

            echo "5. Prune dangling images..."
            docker image prune -f || true
            echo "Deploy sukses."
