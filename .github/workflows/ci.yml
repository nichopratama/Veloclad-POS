name: CI

# Cloud Referee (Nicho-Brain D9): kode tidak "Production Ready" sampai semua check hijau.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (Next.js) — typecheck, build, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      # Placeholder env: `next build` mengevaluasi env.ts (fail-fast) tanpa .env di CI.
      # Nilai dummy hanya untuk lolos build; runtime pakai env asli di server.
      - run: npm run build
        env:
          DATABASE_URL: postgresql://build:build@localhost:5432/build?schema=public
          BETTER_AUTH_SECRET: build_time_placeholder_secret_0123456789
          BETTER_AUTH_URL: http://localhost:3000
      - run: npm audit --audit-level=high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
