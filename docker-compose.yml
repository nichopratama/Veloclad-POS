name: antigravity-pos

services:

  # ── Frontend (React + Nginx) ───────────────────────
  pos-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pos-frontend
    ports:
      - "${FRONTEND_PORT:-3003}:80"
    depends_on:
      pos-api:
        condition: service_healthy
    restart: unless-stopped

  # ── Backend API (Node.js + Express) ───────────────
  pos-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: pos-api
    ports:
      - "${API_HOST_PORT:-3021}:3004"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Database (PostgreSQL) ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-antigravity_pos}
      POSTGRES_USER: ${DB_USER:-pos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3022:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos_user} -d ${DB_NAME:-antigravity_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App BARU (Next.js: frontend + /api) ──────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: pos-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file: ./web/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
